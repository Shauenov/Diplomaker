[pytest]
# Pytest Configuration
# ====================
# Configuration for the diploma automation test suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers for test categorization
markers =
    unit: Unit tests for individual functions/classes (fast, isolated)
    integration: Integration tests combining multiple components (slower)
    slow: Tests that take 5+ seconds to run
    
# Test collection options
testpaths = tests

# Coverage options (if pytest-cov is installed)
# --cov=core --cov=config --cov=data --cov-report=html

# Timeout for tests (if pytest-timeout is installed)
# timeout = 300

# Ignore certain warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
